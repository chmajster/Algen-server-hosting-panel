{% extends "layouts/base.html" %}
{% block content %}
<div class="surface-card p-3"><h1 class="h3 mb-3">Moje backupy</h1><div class="table-responsive"><table class="table"><thead><tr><th>Typ</th><th>Status</th><th>Ścieżka</th><th>Utworzono</th></tr></thead><tbody>{% for backup in backups %}<tr><td>{{ backup.backup_type }}</td><td>{{ backup.status }}</td><td>{{ backup.storage_path }}</td><td>{{ backup.created_at.strftime('%Y-%m-%d') }}</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
