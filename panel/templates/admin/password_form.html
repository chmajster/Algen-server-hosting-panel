{% extends "layouts/base.html" %}
{% block content %}
<div class="surface-card p-4">
  <h1 class="h3 mb-4">Reset hasła: {{ user.username }}</h1>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="mb-3">{{ form.password.label(class="form-label") }}{{ form.password(class="form-control") }}</div>
    <button class="btn btn-primary">{{ form.submit.label.text }}</button>
  </form>
</div>
{% endblock %}
